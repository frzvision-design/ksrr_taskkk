
name: student_services_app
description: A Persian student services task management application
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.9.1

  # Networking
  http: ^1.5.0

  # State Management
  provider: ^6.1.5

  # Local Storage
  shared_preferences: ^2.5.3

  # Utilities
  uuid: ^4.5.1

  # Date & Time
  intl: ^0.20.2
  shamsi_date: ^1.1.1

  # Notifications
  flutter_local_notifications: ^16.3.3

  # Fonts
  google_fonts: ^6.3.2

  # JSON
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.6.0
  json_serializable: ^6.11.1

flutter:
  uses-material-design: true

